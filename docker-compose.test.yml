version: "3.9"

# ── Isolated test environment ─────────────────────────────────────────────────
# Uses different ports (5433, 6380) to avoid conflicting with dev stack.
# Run: docker-compose -f docker-compose.test.yml up -d
# Tear down: docker-compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviewapp_test
      POSTGRES_USER: reviewapp
      POSTGRES_PASSWORD: reviewapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewapp -d reviewapp_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_test_data:
