services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "4001:8000"
    env_file: .env
    volumes:
      - .:/app
      - chromadb_data:/data/chromadb
      - bm25_data:/data/bm25
      - repos_tmp:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker-reviews:
    build: .
    command: celery -A app.worker worker --loglevel=info -Q reviews --concurrency=4
    env_file: .env
    volumes:
      - .:/app
      - chromadb_data:/data/chromadb
      - bm25_data:/data/bm25
      - repos_tmp:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker-indexing:
    build: .
    command: celery -A app.worker worker --loglevel=info -Q indexing --concurrency=2
    env_file: .env
    volumes:
      - .:/app
      - chromadb_data:/data/chromadb
      - bm25_data:/data/bm25
      - repos_tmp:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  beat:
    build: .
    command: celery -A app.worker beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "4000:3000"
    env_file: ./dashboard/.env
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviewapp
      POSTGRES_USER: reviewapp
      POSTGRES_PASSWORD: reviewapp
    ports:
      - "4002:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewapp -d reviewapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "4003:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  chromadb_data:
  bm25_data:
  repos_tmp:
